services:
  campus-api:
    build: .
    container_name: campus-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  campus-ui:
    build: .
    container_name: campus-ui
    command: streamlit run streamlit_app/Home.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      STREAMLIT_API_BASE: http://campus-api:8000
    ports:
      - "8501:8501"
    depends_on:
      - campus-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
